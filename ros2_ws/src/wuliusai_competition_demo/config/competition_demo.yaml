# This file contains only calibrated, competition-level coordinates.  The
# shipped values are deliberately incomplete: the demo refuses to move until
# field_calibration.image_corners_px and destination waypoints are taught.
vision:
  config_file: ""
  model_file: ""
  minimum_confidence: 0.80
  retries: 2
  # Pixel radius used to score a dense, clear scoop area inside a source ROI.
  scoop_radius_px: 45
  border_margin_px: 25
  minimum_foreground_ratio: 0.02
field:
  width_mm: 4000.0
  height_mm: 2000.0
  safe_point_mm: [2000.0, 1000.0]
  # Click order is bottom_left, bottom_right, top_right, top_left.
  image_corners_px: []
source_nominal_mm:
  mung_bean: [400.0, 400.0]
  soybean: [400.0, 1000.0]
  white_bean: [400.0, 1600.0]
destination_slots_mm:
  # Teach each drop centre.  Empty slots make that task reject before motion.
  "4": []
  "5": []
  "6": []
  "7": []
motion:
  gantry_action: /stepper_controller/move_gantry
  stop_service: /stepper_controller/stop
  z_action: /yz_controller/move_axis
  z_stop_service: /yz_controller/stop
  # 5 mm/s corresponds to 500 pps with the current 100 pulses/mm X setting,
  # matching the successful low-speed mechanism test.
  max_speed_mm_s: 5.0
  action_wait_s: 5.0
tool:
  # Y and bucket remain simulated. Z is the real PA2/PA3 channel (axis 1) on
  # /dev/yz_controller. Units are raw pulses until Z mechanics are calibrated.
  y_simulated: true
  z_simulated: false
  bucket_simulated: true
  z_axis: 1
  z_down_direction: 1
  z_travel_pulses: 1600.0
  z_speed_pps: 500.0
  scoop_seconds: 1.2
  drop_seconds: 0.8
